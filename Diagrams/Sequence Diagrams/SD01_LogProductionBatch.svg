<svg xmlns="http://www.w3.org/2000/svg" width="680" height="780" viewBox="0 0 680 780" style="background:white;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#333"/>
    </marker>
  </defs>

  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Log Production Batch &amp; Operator Notes — Sequence Diagram</text>

  <!-- Actor -->
  <circle cx="80" cy="50" r="11" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="61" x2="80" y2="93" stroke="#333" stroke-width="1.5"/>
  <line x1="62" y1="76" x2="98" y2="76" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="93" x2="66" y2="117" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="93" x2="94" y2="117" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="133" text-anchor="middle" font-size="12" fill="#333">Machine Operator</text>

  <!-- System box -->
  <rect x="400" y="40" width="130" height="34" rx="4" fill="#e8e8f0" stroke="#333" stroke-width="1.2"/>
  <text x="465" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">SPF System</text>

  <!-- Lifelines -->
  <line x1="80" y1="140" x2="80" y2="755" stroke="#333" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="465" y1="74" x2="465" y2="755" stroke="#333" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- 1 -->
  <line x1="80" y1="165" x2="398" y2="165" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="159" font-size="11" fill="#333">Login with operator credentials</text>

  <!-- 2 -->
  <line x1="80" y1="210" x2="398" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="204" font-size="11" fill="#333">Navigate to Production Log</text>

  <!-- 3 -->
  <line x1="80" y1="255" x2="398" y2="255" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="249" font-size="11" fill="#333">Select machine, shift and operator name</text>

  <!-- 4 -->
  <line x1="80" y1="300" x2="398" y2="300" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="294" font-size="11" fill="#333">Enter output quantity and batch status</text>

  <!-- Self-loop 5: validate -->
  <path d="M465,335 L503,335 L503,359 L467,359" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="508" y="351" font-size="11" fill="#333">Validate required fields</text>
  <!-- Note -->
  <path d="M508,365 L658,365 L666,375 L666,403 L508,403 Z" fill="#fffce0" stroke="#bbb" stroke-width="1"/>
  <path d="M658,365 L658,375 L666,375" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="514" y="381" font-size="10" fill="#555">If field is empty or machine under</text>
  <text x="514" y="395" font-size="10" fill="#555">maintenance: highlight and block submit</text>

  <!-- 6 -->
  <line x1="80" y1="425" x2="398" y2="425" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="419" font-size="11" fill="#333">Submit production batch</text>

  <!-- Self-loop 7 -->
  <path d="M465,460 L503,460 L503,484 L467,484" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="508" y="476" font-size="11" fill="#333">Assign batch ID and timestamp</text>

  <!-- 8: sys → MO -->
  <line x1="465" y1="518" x2="82" y2="518" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="512" font-size="11" fill="#333">Display confirmation, batch appears in log</text>

  <!-- 9 -->
  <line x1="80" y1="558" x2="398" y2="558" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="552" font-size="11" fill="#333">Select Add Note from batch detail view</text>

  <!-- 10 -->
  <line x1="80" y1="600" x2="398" y2="600" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="594" font-size="11" fill="#333">Enter free-text note and submit</text>

  <!-- Self-loop 11 -->
  <path d="M465,635 L503,635 L503,659 L467,659" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="508" y="651" font-size="11" fill="#333">Save note linked to batch and timestamp</text>
  <!-- Note -->
  <path d="M508,665 L658,665 L666,675 L666,699 L508,699 Z" fill="#fffce0" stroke="#bbb" stroke-width="1"/>
  <path d="M658,665 L658,675 L666,675" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="514" y="681" font-size="10" fill="#555">If blank note submitted:</text>
  <text x="514" y="695" font-size="10" fill="#555">→ Prompt to enter content before saving</text>

  <!-- 12: sys → MO -->
  <line x1="465" y1="720" x2="82" y2="720" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="86" y="714" font-size="11" fill="#333">Note visible in batch record immediately</text>
</svg>
